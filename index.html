<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>
        <title>Фирма CPS</title>
    </head>
    <body class="body">
        <header class="header">
            <nav class="header-navigation">
                <div class="header-container header-navigation__left-container ">    
                    <a class="icon icon__burger" href=""></a>
                    <svg class="delimeter delimeter_hidden_true" width="2" height="32">
                        <rect y="1" width="2px" height="32px" fill="#EAEAEA" ry="1">
                    </svg>
                    <a class="icon__logo" href=""></a>
                    <svg class="delimeter" width="2" height="32">
                        <rect y="1" width="2px" height="32px" fill="#EAEAEA" ry="1">
                    </svg>
                </div>
                <div class="header-container header-navigation__right-container">
                    <a class="icon icon__call icon_hidden_true" href=""></a>
                    <a class="icon icon__chat icon_hidden_true" href=""></a>
                    <a class="icon icon__profile icon_hidden_true" href=""></a>
                    <svg class="delimeter delimeter_hidden_true" width="2" height="32">
                        <rect y="1" width="2px" height="32px" fill="#EAEAEA" ry="1">
                    </svg>
                    <a class="icon icon__repair" href=""></a>
                    <a class="icon icon__checkstatus" href=""></a>
                </div>
            </nav>
        </header>
        
        <main class="main">
            <section class="main-section">
                <h1 class="main-section__header">
                    Услуги и сервисы
                </h1>

                <nav class="main-section__navigation">
                    <button class="main-section__nav-button">Ремонтируемые устройства</button>
                    <button class="main-section__nav-button">Ремонтируемые бренды</button>
                    <button class="main-section__nav-button">Дополнительные услуги</button>
                    <button class="main-section__nav-button">Цены на услуги</button>
                    <button class="main-section__nav-button">Адреса сервисных центров</button>
                    <button class="main-section__nav-button">Специальные цены</button>
                    <button class="main-section__nav-button">Отзывы</button>
                </nav>

                <div class="main-section__description">
                    <div>
                        <p>
                            Мы являемся авторизованным сервисным центром по ремонту техники Dell. Только у нас вы можете отремонтировать свой ноутбук Dell с официальной гарантией производителя.
                        </p>
                        <p>
                            Мы успешно работаем с 1992 года и заслужили репутацию надежного партнера
                        </p>
                        <button class="read-more">Читать далее</button>
                    </div>
                    <img src="/img/mainSection/bigPicture.svg" alt="CPS logo photo">
                </div>
                
            </section>

        </main>
    </body>
</html>
