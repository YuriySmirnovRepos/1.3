<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>
        <title>Фирма CPS</title>
    </head>
    <body>
        <header>
            <nav class="header-navigation">
                <div class="header-navigation__left-container">
                    <a class="header-navigation__burger" href=""></a>
                    <svg class="header-navigation__delimeter" width="2" height="32">
                        <rect y="1" width="2px" height="32px" fill="#EAEAEA" ry="1">
                    </svg>
                    <a class="header-navigation__logo" href=""></a>
                    <svg class="header-navigation__delimeter" width="2" height="32">
                        <rect y="1" width="2px" height="32px" fill="#EAEAEA" ry="1">
                    </svg>
                </div>
                <div class="header-navigation__right-container">
                    <a class="header-navigation__call" href=""></a>
                    <a class="header-navigation__chat" href=""></a>
                    <a class="header-navigation__profile" href=""></a>
                    <svg class="header-navigation__delimeter" width="2" height="32">
                        <rect y="1" width="2px" height="32px" fill="#EAEAEA" ry="1">
                    </svg>
                    <a class="header-navigation__repair" href=""></a>
                    <a class="header-navigation__checkstatus" href=""></a>
                </div>
            </nav>

        </header>

        <main>
            <section class="services-section">

                <svg width="300" height="40">
                    <rect width="6px" height="40px" fill="#41F6D7" ry="5px" x="-2"/>
                    <text x="16" y="30" class="services-section__header">Услуги и сервисы</text>
                </svg>

                <nav>
                    <button>Ремонтируемые устройства</button>
                    <button>Ремонтируемые бренды</button>
                    <button>Дополнительные услуги</button>
                    <button>Цены на услуги</button>
                    <button>Адреса сервисных центров</button>
                    <button>Специальные цены</button>
                    <button>Отзывы</button>
                </nav>

                <div class="services-section__container">
                    <div>
                        <p>
                            Мы являемся авторизованным сервисным центром по ремонту техники Dell. Только у нас вы можете отремонтировать свой ноутбук Dell с официальной гарантией производителя.
                        </p>
                        <p>
                            Мы успешно работаем с 1992 года и заслужили репутацию надежного партнера
                        </p>
                        <button class="read-more">Читать далее</button>
                    </div>
                    <img src="/img/mainSection/bigPicture.svg" alt="CPS logo photo">
                </div>
                
            </section>

        </main>
    </body>
</html>
